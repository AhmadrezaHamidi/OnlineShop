version: '3.9'

# ╔══════════════════════════════════════════════════════════════════╗
# ║  Ahmad OnlineShop — Docker Compose                               ║
# ║  API · SQL Server · MinIO · Redis (optional)                     ║
# ╚══════════════════════════════════════════════════════════════════╝

services:

  # ── API ──────────────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: onlineshop-api
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_ENVIRONMENT:               Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver;Database=AhmadOnlineShop;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__CommandConnection: "Server=sqlserver;Database=AhmadOnlineShop;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;"
      ConnectionStrings__QueryConnection:   "Server=sqlserver;Database=AhmadOnlineShop;User Id=sa;Password=${SQL_PASSWORD};TrustServerCertificate=True;"
      Jwt__Secret:           "${JWT_SECRET}"
      Jwt__ValidIssuer:      AhmadOnlineShop
      Jwt__ValidAudience:    AhmadOnlineShop
      Sms__ApiKey:           "${SMS_API_KEY}"
      PaymentGateway__MerchantId: "${ZARINPAL_MERCHANT_ID}"
      PaymentGateway__Sandbox:    "true"
      FileStorage__Endpoint:    "minio:9000"
      FileStorage__AccessKey:   "${MINIO_ACCESS_KEY}"
      FileStorage__SecretKey:   "${MINIO_SECRET_KEY}"
      FileStorage__UseSSL:      "false"
      FileStorage__DefaultBucket: products
      FileStorage__PublicBaseUrl: "http://localhost:9000"
      RedisOptions__ConnectionString: "redis:6379,password=${REDIS_PASSWORD}"
      UseFakeServices: "false"
    depends_on:
      sqlserver:
        condition: service_healthy
      minio:
        condition: service_healthy
    networks:
      - onlineshop-net
    restart: unless-stopped

  # ── SQL Server ────────────────────────────────────────────────────────────────
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: onlineshop-sql
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA:   Y
      SA_PASSWORD:   "${SQL_PASSWORD}"
      MSSQL_PID:     Developer
    volumes:
      - sqlserver-data:/var/opt/mssql
    networks:
      - onlineshop-net
    restart: unless-stopped
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${SQL_PASSWORD}" -Q "SELECT 1" -b -C
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  # ── MinIO (Object Storage — تصاویر محصول) ────────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: onlineshop-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console (http://localhost:9001)
    environment:
      MINIO_ROOT_USER:     "${MINIO_ACCESS_KEY}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY}"
    volumes:
      - minio-data:/data
    networks:
      - onlineshop-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis (optional — cache) ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: onlineshop-redis
    ports:
      - "6379:6379"
    command: redis-server --requirepass "${REDIS_PASSWORD}" --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - onlineshop-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  sqlserver-data:
  minio-data:
  redis-data:

networks:
  onlineshop-net:
    driver: bridge
